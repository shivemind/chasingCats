name: Postman Catalog Link
on:
  workflow_dispatch:

jobs:
  link-workspace:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ACCESS_TOKEN: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
      WORKSPACE_ID: ${{ vars.POSTMAN_WORKSPACE_ID }}
      REPO_URL: https://github.com/${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
      - name: Check and link workspace via Bifrost
        run: |
          echo "Repository: $REPO_URL"
          echo "Workspace:  $WORKSPACE_ID"

          echo ""
          echo "Step 1: Check current filesystem link..."
          RESP=$(curl -s -X POST \
            "https://bifrost-premium-https-v4.gw.postman.com/ws/proxy" \
            -H "Content-Type: application/json" \
            -H "x-access-token: $ACCESS_TOKEN" \
            -H "x-entity-team-id: " \
            -d "{\"service\":\"workspaces\",\"method\":\"GET\",\"path\":\"/workspaces/$WORKSPACE_ID/filesystem\",\"body\":{}}")

          echo "Current state: $RESP"
          LINKED_REPO=$(echo "$RESP" | jq -r '.data.repo // empty' 2>/dev/null)

          if [ "$LINKED_REPO" = "$REPO_URL" ]; then
            echo "Already linked to correct repo."
            exit 0
          elif [ -n "$LINKED_REPO" ]; then
            echo "Linked to wrong repo ($LINKED_REPO). Deleting..."
            curl -s -X POST \
              "https://bifrost-premium-https-v4.gw.postman.com/ws/proxy" \
              -H "Content-Type: application/json" \
              -H "x-access-token: $ACCESS_TOKEN" \
              -H "x-entity-team-id: " \
              -d "{\"service\":\"workspaces\",\"method\":\"DELETE\",\"path\":\"/workspaces/$WORKSPACE_ID/filesystem\",\"body\":{}}"
            echo "Deleted."
          fi

          echo ""
          echo "Step 2: Create link..."
          LINK_RESP=$(curl -s -X POST \
            "https://bifrost-premium-https-v4.gw.postman.com/ws/proxy" \
            -H "Content-Type: application/json" \
            -H "x-access-token: $ACCESS_TOKEN" \
            -H "x-entity-team-id: " \
            -d "{\"service\":\"workspaces\",\"method\":\"POST\",\"path\":\"/workspaces/$WORKSPACE_ID/filesystem\",\"body\":{\"path\":\"/\",\"repo\":\"$REPO_URL\",\"versionControl\":true}}")

          echo "Link result: $LINK_RESP"
          echo ""

          SUCCESS=$(echo "$LINK_RESP" | jq -r '.data.id // empty' 2>/dev/null)
          if [ -n "$SUCCESS" ]; then
            echo "Linked workspace to $REPO_URL"
          else
            MSG=$(echo "$LINK_RESP" | jq -r '.error.message // empty' 2>/dev/null)
            if echo "$MSG" | grep -qi "already"; then
              echo "Link already exists."
            else
              echo "::error::Link failed: $MSG"
              exit 1
            fi
          fi