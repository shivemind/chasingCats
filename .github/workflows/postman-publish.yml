name: Publish to Postman Cloud

on:
  push:
    branches: [main]
    paths:
      - 'postman/**'
      - 'openapi/**'
      - '.postman/**'
  workflow_dispatch:

jobs:
  publish:
    name: Sync to Postman Cloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Postman CLI
        run: curl -o- "https://dl-cli.pstmn.io/install/unix.sh" | sh

      - name: Login to Postman
        run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}

      - name: Push workspace to Postman Cloud
        run: postman workspace push -y

  test:
    name: Run API Tests
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Run Postman Collection
        uses: postmanlabs/postman-cli-action@v1
        with:
          command: 'collection run dc07120e-d012-4438-b130-6cad3b9034f6 -e a034caf0-b2a9-4e23-9b4d-8245a59a8c01'
          api-key: ${{ secrets.POSTMAN_API_KEY }}
        continue-on-error: true

      - name: Summary
        if: always()
        run: |
          echo "### Postman API Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Collection: dc07120e-d012-4438-b130-6cad3b9034f6" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: a034caf0-b2a9-4e23-9b4d-8245a59a8c01" >> $GITHUB_STEP_SUMMARY