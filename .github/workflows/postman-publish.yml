name: Publish to Postman Cloud

on:
  push:
    branches: [main]
    paths:
      - 'postman/**'
      - 'openapi/**'
      - '.postman/**'
  workflow_dispatch:

jobs:
  publish-and-test:
    name: Sync & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Postman CLI
        run: curl -o- "https://dl-cli.pstmn.io/install/unix.sh" | sh

      - name: Login to Postman
        run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}

      - name: Push workspace to Postman Cloud
        run: postman workspace push -y

      - name: Discover and run collection tests
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          WORKSPACE_ID: 503ba3d9-e13c-440f-9471-5a4d2aac3f7a
        run: |
          COLL_UID=$(curl -sf "https://api.getpostman.com/workspaces/$WORKSPACE_ID" \
            -H "x-api-key: $POSTMAN_API_KEY" | \
            jq -r '.workspace.collections[0].uid')

          ENV_UID=$(curl -sf "https://api.getpostman.com/workspaces/$WORKSPACE_ID" \
            -H "x-api-key: $POSTMAN_API_KEY" | \
            jq -r '[.workspace.environments[] | select(.name | test("Production|Prod"; "i"))][0].uid // .workspace.environments[0].uid')

          echo "Collection UID: $COLL_UID"
          echo "Environment UID: $ENV_UID"

          if [ "$COLL_UID" != "null" ] && [ -n "$COLL_UID" ]; then
            if [ "$ENV_UID" != "null" ] && [ -n "$ENV_UID" ]; then
              postman collection run "$COLL_UID" -e "$ENV_UID" || true
            else
              postman collection run "$COLL_UID" || true
            fi
          else
            echo "No collection found in workspace"
          fi

      - name: Summary
        if: always()
        run: |
          echo "### Postman Cloud Sync & Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Workspace ID: 503ba3d9-e13c-440f-9471-5a4d2aac3f7a" >> $GITHUB_STEP_SUMMARY
          echo "- Workspace synced and collection tests run" >> $GITHUB_STEP_SUMMARY