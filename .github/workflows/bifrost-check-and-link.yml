name: Bifrost Check & Link
on:
  workflow_dispatch:

jobs:
  check-and-link:
    runs-on: ubuntu-latest
    steps:
      - name: Check and link workspace to this repo
        env:
          ACCESS_TOKEN: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          WORKSPACE_ID: ${{ vars.POSTMAN_WORKSPACE_ID }}
          REPO_URL: https://github.com/${{ github.repository }}
        run: |
          echo "Repository: $REPO_URL"
          echo "Workspace: $WORKSPACE_ID"

          if [ -z "$WORKSPACE_ID" ]; then
            echo "::error::POSTMAN_WORKSPACE_ID variable not set"
            exit 1
          fi

          echo ""
          echo "Step 1: Check current filesystem link..."
          RESP=$(curl -s -X POST \
            "https://bifrost-premium-https-v4.gw.postman.com/ws/proxy" \
            -H "Content-Type: application/json" \
            -H "x-access-token: $ACCESS_TOKEN" \
            -H "x-entity-team-id: " \
            -d "{\"service\":\"workspaces\",\"method\":\"GET\",\"path\":\"/workspaces/$WORKSPACE_ID/filesystem\",\"body\":{}}")

          echo "GET response: $RESP"

          # Check if already linked to the correct repo
          LINKED_REPO=$(echo "$RESP" | jq -r '.data.repo // empty' 2>/dev/null)

          if [ "$LINKED_REPO" = "$REPO_URL" ]; then
            echo "âœ… Already linked to $REPO_URL"
            exit 0
          elif [ -n "$LINKED_REPO" ]; then
            echo "âš ï¸ Currently linked to: $LINKED_REPO (wrong repo)"
            echo "Deleting stale link..."
            DEL_RESP=$(curl -s -X POST \
              "https://bifrost-premium-https-v4.gw.postman.com/ws/proxy" \
              -H "Content-Type: application/json" \
              -H "x-access-token: $ACCESS_TOKEN" \
              -H "x-entity-team-id: " \
              -d "{\"service\":\"workspaces\",\"method\":\"DELETE\",\"path\":\"/workspaces/$WORKSPACE_ID/filesystem\",\"body\":{}}")
            echo "DELETE response: $DEL_RESP"
          else
            echo "No existing link found."
          fi

          echo ""
          echo "Step 2: Create new link..."
          LINK_RESP=$(curl -s -X POST \
            "https://bifrost-premium-https-v4.gw.postman.com/ws/proxy" \
            -H "Content-Type: application/json" \
            -H "x-access-token: $ACCESS_TOKEN" \
            -H "x-entity-team-id: " \
            -d "{\"service\":\"workspaces\",\"method\":\"POST\",\"path\":\"/workspaces/$WORKSPACE_ID/filesystem\",\"body\":{\"path\":\"/\",\"repo\":\"$REPO_URL\",\"versionControl\":true}}")

          echo "LINK response: $LINK_RESP"

          SUCCESS=$(echo "$LINK_RESP" | jq -r '.data.id // empty' 2>/dev/null)
          if [ -n "$SUCCESS" ]; then
            echo "âœ… Successfully linked workspace $WORKSPACE_ID to $REPO_URL"
          else
            ERROR=$(echo "$LINK_RESP" | jq -r '.error.message // empty' 2>/dev/null)
            if echo "$ERROR" | grep -q "already"; then
              echo "âœ… Link already exists (race condition or prior link)"
            else
              echo "::error::Failed to link: $ERROR"
              exit 1
            fi
          fi
