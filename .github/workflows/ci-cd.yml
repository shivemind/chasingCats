name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "22"
  ECR_REPO: "chasing-cats"
  K8S_DEPLOYMENT: "chasing-cats"

jobs:
  # ── Gate 1: Validate & Build ──────────────────────────────────────
  validate:
    name: "Gate 1: Validate & Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate
        continue-on-error: true

      - name: TypeScript type-check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── Gate 2: Deploy ────────────────────────────────────────────────
  deploy:
    name: "Gate 2: Deploy"
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Vercel
        run: |
          npm i -g vercel
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        continue-on-error: true
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2
        continue-on-error: true

      - name: Build and push Docker image
        id: meta
        continue-on-error: true
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_REPO:$IMAGE_TAG -t $REGISTRY/$ECR_REPO:latest .
          docker push $REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPO:latest
          echo "tags=$REGISTRY/$ECR_REPO:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  # ── Gate 3: Kubernetes Deploy ─────────────────────────────────────
  kubernetes-deploy:
    name: "Gate 3: Kubernetes (EKS)"
    needs: deploy
    if: ${{ vars.EKS_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}

      - name: Apply K8s manifests
        run: kubectl apply -f k8s/ -n atlas-production

      - name: Rolling update
        run: |
          kubectl set image deployment/${{ env.K8S_DEPLOYMENT }} \
            ${{ env.K8S_DEPLOYMENT }}=${{ needs.deploy.outputs.image_tag }} \
            -n atlas-production

      - name: Wait for rollout
        run: kubectl rollout status deployment/${{ env.K8S_DEPLOYMENT }} -n atlas-production --timeout=300s

      - name: Post-deploy health check
        run: |
          SVC_URL=$(kubectl get svc ${{ env.K8S_DEPLOYMENT }} -n atlas-production -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf "http://${SVC_URL}/api/health" | jq -r '.status // empty' || echo "unreachable")
            if [ "$STATUS" = "ok" ]; then echo "Health check passed"; exit 0; fi
            echo "Attempt $i: $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "Health check failed — initiating rollback"
          kubectl rollout undo deployment/${{ env.K8S_DEPLOYMENT }} -n atlas-production
          exit 1
