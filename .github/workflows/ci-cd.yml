name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "22"
  SPEC_PATH: openapi/openapi.yaml
  API_NAME: "ChasingCats API"
  ECR_REPO: "empire/chasing-cats"
  K8S_DEPLOYMENT: "chasing-cats"

jobs:
  # ── Gate 1: Validate ──────────────────────────────────────────────
  validate:
    name: "Gate 1: Validate & Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: YAML syntax check
        run: npx yaml-lint ${{ env.SPEC_PATH }}

      - name: Spectral OpenAPI lint
        run: npx @stoplight/spectral-cli lint ${{ env.SPEC_PATH }} --fail-severity error
        continue-on-error: true

      - name: TypeScript type-check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}

  # ── Gate 2: Postman Sync ──────────────────────────────────────────
  postman-sync:
    name: "Gate 2: Postman Sync"
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install tools
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Sync to Postman API Catalog
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          POSTMAN_WORKSPACE_ID: ${{ secrets.POSTMAN_WORKSPACE_ID }}
          PRODUCTION_URL: https://chasing-cats.vercel.app
          GITHUB_REPO_URL: https://github.com/${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          chmod +x scripts/sync-to-postman.sh
          ./scripts/sync-to-postman.sh "${{ env.SPEC_PATH }}" "${{ env.API_NAME }}"

  # ── Gate 3: Deploy ────────────────────────────────────────────────
  deploy:
    name: "Gate 3: Deploy"
    needs: postman-sync
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Deploy to Vercel
        run: |
          npm i -g vercel
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: meta
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --build-arg NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" \
            --build-arg NEXTAUTH_URL="${{ secrets.NEXTAUTH_URL }}" \
            -t $REGISTRY/$ECR_REPO:$IMAGE_TAG -t $REGISTRY/$ECR_REPO:latest .
          docker push $REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPO:latest
          echo "tags=$REGISTRY/$ECR_REPO:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  # ── Gate 4: Kubernetes Deploy ─────────────────────────────────────
  kubernetes-deploy:
    name: "Gate 4: Kubernetes (EKS)"
    needs: deploy
    if: ${{ vars.EKS_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}

      - name: Apply K8s manifests
        run: kubectl apply -f k8s/ -n atlas-production

      - name: Set runtime env vars
        run: |
          kubectl set env deployment/${{ env.K8S_DEPLOYMENT }} -n atlas-production \
            DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" \
            NEXTAUTH_URL="${{ secrets.NEXTAUTH_URL }}"

      - name: Rolling update
        env:
          REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
        run: |
          kubectl set image deployment/${{ env.K8S_DEPLOYMENT }} \
            ${{ env.K8S_DEPLOYMENT }}=$REGISTRY/${{ env.ECR_REPO }}:${{ github.sha }} \
            -n atlas-production

      - name: Wait for rollout
        run: kubectl rollout status deployment/${{ env.K8S_DEPLOYMENT }} -n atlas-production --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -n atlas-production -l app=${{ env.K8S_DEPLOYMENT }} -o wide
          echo "Kubernetes deployment updated successfully"

  # ── Gate 5: Postman Collection Run ────────────────────────────────
  postman-collection-run:
    name: "Gate 5: Postman Collection Run"
    needs: deploy
    if: always() && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Install Postman CLI
        run: curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh

      - name: Login to Postman
        run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}

      - name: Resolve Collection UID
        id: resolve
        run: |
          COLL_UID=$(curl -sf "https://api.getpostman.com/collections?workspace=${{ secrets.POSTMAN_WORKSPACE_ID }}" \
            -H "x-api-key: ${{ secrets.POSTMAN_API_KEY }}" \
            | jq -r '.collections[] | select(.name | contains("ChasingCats")) | .uid' | head -1)
          echo "collection_uid=$COLL_UID" >> $GITHUB_OUTPUT
          echo "Resolved collection: $COLL_UID"

      - name: Run Collection
        run: |
          postman collection run ${{ steps.resolve.outputs.collection_uid }} \
            -e 52400725-81d23a78-1fda-40ff-9481-298fe8b8b268 \
            --postman-api-key ${{ secrets.POSTMAN_API_KEY }}

      - name: Summary
        if: always()
        run: |
          echo "### Postman Collection Run - ChasingCats API" >> $GITHUB_STEP_SUMMARY
          echo "- **Collection**: ${{ steps.resolve.outputs.collection_uid }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Production" >> $GITHUB_STEP_SUMMARY

  # ── Gate 6: API Catalog Onboard ───────────────────────────────────
  api-catalog-onboard:
    name: "Gate 6: API Catalog Onboard"
    needs: deploy
    if: always() && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Link workspace to GitHub repo
        env:
          ACCESS_TOKEN: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          TEAM_ID: ${{ secrets.POSTMAN_TEAM_ID }}
          WORKSPACE_ID: "a50959cb-b5b5-4e89-823d-a57e88f658f4"
          REPO_URL: https://github.com/${{ github.repository }}
        run: |
          BIFROST="https://bifrost-premium-https-v4.gw.postman.com"
          RESP=$(curl -sf -X POST "$BIFROST/ws/proxy" \
            -H "Content-Type: application/json" \
            -H "x-access-token: $ACCESS_TOKEN" \
            -H "x-entity-team-id: $TEAM_ID" \
            -d "{\"service\":\"workspaces\",\"method\":\"POST\",\"path\":\"/workspaces/$WORKSPACE_ID/filesystem\",\"body\":{\"path\":\"/\",\"repo\":\"$REPO_URL\",\"versionControl\":true}}" 2>&1) || true
          echo "Workspace link: $RESP"

      - name: Link environment to system environment
        env:
          ACCESS_TOKEN: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          TEAM_ID: ${{ secrets.POSTMAN_TEAM_ID }}
        run: |
          curl -sf -X PUT "https://bifrost-premium-https-v4.gw.postman.com/environment/81d23a78-1fda-40ff-9481-298fe8b8b268" \
            -H "Content-Type: application/json" \
            -H "x-access-token: $ACCESS_TOKEN" \
            -H "x-entity-team-id: $TEAM_ID" \
            -d '{"systemEnvironmentId":"936898ce-cf73-4feb-827e-8a0e9d5e695e"}' || true
          echo "Environment linked to Production system environment"

      - name: Summary
        if: always()
        run: |
          echo "### API Catalog Onboard" >> $GITHUB_STEP_SUMMARY
          echo "- Workspace linked to GitHub repo" >> $GITHUB_STEP_SUMMARY
          echo "- Environment linked to Production system environment" >> $GITHUB_STEP_SUMMARY
